<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .input-row input:focus { border-color: #6366f1; }

    .input-row button {
      padding: 12px 20px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #4f46e5; }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .filters button {
      padding: 6px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      background: #fff;
      font-size: 0.875rem;
      cursor: pointer;
      color: #64748b;
      transition: all 0.2s;
    }

    .filters button.active {
      border-color: #6366f1;
      background: #6366f1;
      color: #fff;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #fff;
      border-radius: 10px;
      border: 2px solid transparent;
      transition: border-color 0.15s, opacity 0.15s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item:hover { border-color: #e2e8f0; }

    .todo-item.done { opacity: 0.5; }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6366f1;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-item .text {
      flex: 1;
      font-size: 1rem;
      color: #1e293b;
      word-break: break-word;
    }

    .todo-item.done .text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .todo-item .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e1;
      font-size: 1.2rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .todo-item .delete-btn:hover { color: #ef4444; }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.875rem;
      color: #94a3b8;
    }

    .footer button {
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      font-size: 0.875rem;
      padding: 4px;
      transition: color 0.15s;
    }

    .footer button:hover { color: #ef4444; }

    .empty {
      text-align: center;
      padding: 40px 0;
      color: #94a3b8;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo List</h1>

    <div class="input-row">
      <input type="text" id="new-todo" placeholder="What needs to be done?" maxlength="200">
      <button onclick="addTodo()">Add</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">All</button>
      <button onclick="setFilter('active', this)">Active</button>
      <button onclick="setFilter('done', this)">Done</button>
    </div>

    <div class="todo-list" id="todo-list"></div>

    <div class="footer">
      <span id="count"></span>
      <button onclick="clearDone()">Clear completed</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('todo-list');
      const active = todos.filter(t => !t.done).length;

      document.getElementById('count').textContent =
        `${active} item${active !== 1 ? 's' : ''} left`;

      const visible = todos.filter(t =>
        filter === 'all' ? true :
        filter === 'active' ? !t.done :
        t.done
      );

      if (visible.length === 0) {
        list.innerHTML = '<div class="empty">Nothing here yet.</div>';
        return;
      }

      list.innerHTML = visible.map(t => `
        <div class="todo-item ${t.done ? 'done' : ''}" data-id="${t.id}">
          <input type="checkbox" ${t.done ? 'checked' : ''}
            onchange="toggleTodo(${t.id})">
          <span class="text">${escapeHtml(t.text)}</span>
          <button class="delete-btn" onclick="deleteTodo(${t.id})">&#x2715;</button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addTodo() {
      const input = document.getElementById('new-todo');
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggleTodo(id) {
      const t = todos.find(t => t.id === id);
      if (t) t.done = !t.done;
      save();
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    document.getElementById('new-todo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
